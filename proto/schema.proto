syntax = "proto3";

// ============================================================
// L4D2Center Anticheat — Reconstructed Protobuf Schema
// Recovered via static analysis of l4d2c_anticheat.exe
// Field numbers known for: SteamID (3), Smurf (9), Addons (13),
// AddonsProvided (14), CheatSigs (5), CheatSigsRequested (15)
// All other field numbers estimated based on JSON ordering.
// ============================================================

package l4d2c;

// ─── Client → Server (on game server connect) ────────────────
message ClientReport {
  // Authentication
  string AppKey    = 1;   // Application key (anti-replay token)
  string Auth      = 2;   // Session auth token

  // Player identity
  string SteamID   = 3;   // Steam64 ID (e.g. "76561198xxxxxxxxx")
  string Nickname  = 4;   // In-game player nickname

  // Anti-cheat core
  repeated bytes CheatSigs      = 5;  // Cheat patterns (server → client, echoed back for freshness)
  string Version                = 6;  // AC client version string
  string Session                = 7;  // Primary session token
  string Session2               = 8;  // Secondary session token
  string Smurf                  = 9;  // Smurf detection data / alt-account info

  // Game state
  string Server    = 10;  // Server name being connected to
  string ServerIP  = 11;  // Server IP:port
  string Game      = 12;  // Game identifier string

  // Addon report
  repeated string Addons        = 13; // List of installed addon filenames/hashes
  bool AddonsProvided           = 14; // True = client sent the addon list

  // Signature feedback
  bool CheatSigsRequested       = 15; // Client requests fresh signatures from server

  // Hardware fingerprint
  HWData HWData                 = 16; // Hardware data bundle

  // OS / install info
  string OS          = 17; // Windows version string
  string InstallDate = 18; // OS install date (from WMI)
  string Path        = 19; // Game installation path

  // Detection result (client → server when pattern found)
  Pattern Pattern    = 20; // Matched cheat signature details

  // VAC / ban flags
  bool VAC           = 21; // VAC ban detected on account
  bool Banned        = 22; // Previously banned by this AC
}

// ─── Server → Client response ────────────────────────────────
message ServerResponse {
  bool Success               = 1;  // True = player allowed to connect
  bool Banned                = 2;  // True = player is banned
  string Code                = 3;  // Status/error code
  string Error               = 4;  // Human-readable error
  repeated bytes CheatSigs   = 5;  // Updated cheat signatures for client
  string ExtraInfo           = 6;  // Extra ban details / reason
}

// ─── Hardware Fingerprint ─────────────────────────────────────
message HWData {
  string CPU         = 1;  // Win32_Processor.ProcessorId + MaxClockSpeed + Cores
  string GPU         = 2;  // GPU model string
  string Disk        = 3;  // Win32_DiskDrive.SerialNumber (primary HWID)
  string MotherB     = 4;  // Win32_BaseBoard.SerialNumber + Manufacturer
  string Model       = 5;  // Combined hardware model string
  string PnpID       = 6;  // Win32_DiskDrive.PNPDeviceID
  string Serial      = 7;  // Derived/combined hardware serial hash
}

// ─── Detected Cheat Pattern ───────────────────────────────────
message Pattern {
  string Name    = 1;  // Cheat identifier/name from signature database
  bytes  Data    = 2;  // Raw bytes that matched
  int64  Size    = 3;  // Size of matched memory region
  string Path    = 4;  // Module path where match was found (if identifiable)
}

// ─── Addon Entry ─────────────────────────────────────────────
// (Addons field is repeated string, but may encode as:)
message Addon {
  string Name    = 1;  // .vpk filename
  bytes  Hash    = 2;  // File hash (MD5 or SHA256)
  int64  Size    = 3;  // File size in bytes
}

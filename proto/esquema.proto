// Esquema Protobuf — L4D2Center Anticheat
// Reconstruido desde el binario mediante análisis estático.
// Nombres de tipos ofuscados por garble — se mantienen los originales del binario.
// Field numbers y tipos confirmados desde anotaciones protobuf:"..." en el binario.
// Paquete ofuscado: P4mAKk
// Contenedor de tipos de detección: x1JPPahi

syntax = "proto3";

// -----------------------------------------------------------------
// BEt_icchsrxy — Mensaje Principal de Conexión (cliente → servidor)
// -----------------------------------------------------------------
// Enviado cuando el jugador intenta conectarse a un servidor.
// Contiene HWID, addons, auth y todos los datos de validación.
message BEt_icchsrxy {
  bytes          Auth               = 1;   // token de autenticación
  int64          Session            = 2;   // ID de sesión primaria
  int64          Session2           = 3;   // ID de sesión secundaria
  int64          Version            = 4;   // versión del AC cliente
  int64          Game               = 5;   // AppID del juego (L4D2 = 550)
  bytes          Server             = 6;   // "IP:Puerto" del servidor de destino
  bytes          Code               = 7;   // código de operación
  bytes          Data               = 8;   // datos adicionales (capturas, etc.)
  bytes          Smurf              = 9;   // resultado de detección anti-smurf
  bytes          HWData             = 10;  // ENOV9d serializado — hardware fingerprint
  bytes          AppKey             = 11;  // clave de aplicación
  bytes          ExtraInfo          = 12;  // información extra (arch, platform, buildType)
  repeated bytes Addons             = 13;  // lista de archivos VPK instalados
  bool           AddonsProvided     = 14;  // indica si se enviaron los addons
  bool           CheatSigsRequested = 15;  // solicitar firmas de cheats al servidor
}

// -----------------------------------------------------------------
// ENOV9d — Hardware Fingerprint (HWID completo)
// -----------------------------------------------------------------
// Componentes repeated: cada campo es una lista de sub-mensajes serializados.
// Los sub-mensajes individuales son EetHP7O (Disk), KLfm8u7 (MB), BlhNU1RKfjg (GPU).
// Todos los datos provienen de consultas WMI vía COM (IWbemServices::ExecQuery).
message ENOV9d {
  bool           Success = 1;   // éxito de recolección completa
  repeated bytes OS      = 2;   // Win32_OperatingSystem (BuildNumber, Version)
  repeated bytes CPU     = 3;   // Win32_Processor (ProcessorId)
  repeated bytes Disk    = 4;   // Win32_DiskDrive (SerialNumber, Model) → EetHP7O
  repeated bytes MotherB = 5;   // Win32_BaseBoard (SerialNumber, Model) → KLfm8u7
  repeated bytes GPU     = 6;   // Win32_VideoController (PNPDeviceID, Model) → BlhNU1RKfjg
}

// -----------------------------------------------------------------
// EetHP7O — Datos de Disco Individual (Win32_DiskDrive)
// -----------------------------------------------------------------
message EetHP7O {
  bool  Success = 1;
  bytes Serial  = 2;  // SerialNumber del disco (via WMI o IOCTL_STORAGE_QUERY_PROPERTY)
  bytes Model   = 3;  // Model del disco
}

// -----------------------------------------------------------------
// KLfm8u7 — Datos de Motherboard Individual (Win32_BaseBoard)
// -----------------------------------------------------------------
message KLfm8u7 {
  bool  Success = 1;
  bytes Serial  = 2;  // SerialNumber de la motherboard (SMBIOS)
  bytes Model   = 3;  // Model de la motherboard
}

// -----------------------------------------------------------------
// BlhNU1RKfjg — Datos de GPU Individual (Win32_VideoController)
// -----------------------------------------------------------------
message BlhNU1RKfjg {
  bool  Success = 1;
  bytes Model   = 2;  // nombre del adaptador de video
  bytes PnpID   = 3;  // PNPDeviceID — identificador único PCI de la GPU
}

// -----------------------------------------------------------------
// AAUUUh — Datos Anti-Smurf (fecha de instalación + tipo de cuenta)
// -----------------------------------------------------------------
// Enviado como lista junto con otros mensajes de detección.
// InstallDate viene del registro de Windows o WMI Win32_Product.
message AAUUUh {
  bool  Success     = 1;
  bytes Type        = 2;  // tipo de instalación o clasificación
  int64 InstallDate = 3;  // timestamp UNIX de instalación de Steam
}

// -----------------------------------------------------------------
// BiK8wj — Información de Archivo (verificación de VPK/addons)
// -----------------------------------------------------------------
// Enviado como lista (repeated) para reportar archivos del directorio del juego.
// El glob pattern "*.vpk" en el binario confirma la búsqueda de archivos VPK.
message BiK8wj {
  bytes Path = 1;  // ruta del archivo
  int64 Size = 2;  // tamaño del archivo en bytes
}

// -----------------------------------------------------------------
// ZwlL2R6Gvy — Información de Addon/Workshop Item
// -----------------------------------------------------------------
message ZwlL2R6Gvy {
  bool  Success = 1;
  bytes ID      = 2;  // ID del addon (workshop ID o hash interno)
  bytes Name    = 3;  // nombre del addon
}

// -----------------------------------------------------------------
// W99qYP — Firma de Cheat Individual (CheatSignature)
// -----------------------------------------------------------------
// El servidor envía repeated de estos en H1oahxz1l3iY.CheatSigs.
// El cliente busca cada patrón en la memoria del proceso left4dead2.exe.
// Si hay match: se reporta al servidor con Name y la dirección del match.
message W99qYP {
  bytes Name    = 1;  // nombre identificador del cheat
  bytes Pattern = 2;  // secuencia de bytes del patrón (puede contener wildcards)
}

// -----------------------------------------------------------------
// Qi1Z8I — Estado de Cuenta Steam (ban check response)
// -----------------------------------------------------------------
message Qi1Z8I {
  bool  Success  = 1;
  bytes Error    = 2;
  bytes SteamID  = 3;  // Steam ID del jugador (64-bit como string)
  bytes Nickname = 4;  // nombre en Steam
  bool  Banned   = 5;  // true si la cuenta está baneada
}

// -----------------------------------------------------------------
// H1oahxz1l3iY — Respuesta Inicial del Servidor (ConnectResponse)
// -----------------------------------------------------------------
message H1oahxz1l3iY {
  bool           Success   = 1;
  bytes          Error     = 2;
  bytes          ServerIP  = 3;   // IP real del servidor de juego
  // field 4: no identificado
  repeated bytes CheatSigs = 5;   // W99qYP serializado — patrones de cheats activos
}

// -----------------------------------------------------------------
// Ok4xyD92c8 — Verificación de Versión del AC
// -----------------------------------------------------------------
message Ok4xyD92c8 {
  bool  Success = 1;
  int64 Version = 2;  // versión del AC que el servidor acepta/exige
}

// -----------------------------------------------------------------
// P8ePybs — Respuesta de Autenticación (contiene session token)
// -----------------------------------------------------------------
message P8ePybs {
  bool  Success = 1;
  bytes Error   = 2;
  int64 Session = 3;  // session token asignado por el servidor
}

// -----------------------------------------------------------------
// QBb3vhiLW7n — Request de Autenticación / Heartbeat
// -----------------------------------------------------------------
// Enviado periódicamente para mantener la sesión activa.
message QBb3vhiLW7n {
  bytes Auth    = 1;  // credencial de auth
  int64 Session = 2;  // session ID activo
}

// -----------------------------------------------------------------
// N0Iwv9FQ — Respuesta Genérica
// -----------------------------------------------------------------
message N0Iwv9FQ {
  bool  Success = 1;
  bytes Error   = 2;
}

// -----------------------------------------------------------------
// MdQhYNc — Mensaje Vacío (posiblemente Heartbeat Ping)
// -----------------------------------------------------------------
// Sin campos identificados. Probablemente ping vacío de heartbeat.
message MdQhYNc {}
